spring.application.name=backend

server.port=8080

claude.api.base-url=https://api.anthropic.com
claude.api.version=2023-06-01
claude.api.model=claude-sonnet-4-5
claude.api.max-tokens=2048
claude.api.connect-timeout-seconds=5
claude.api.read-timeout-seconds=60
claude.api.system-prompt-resource=classpath:prompts/code_review_system_prompt_v1.txt

logging.level.com.claudereview=INFO
logging.level.org.springframework.web=INFO
logging.level.com.claudereview.backend.claude=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never